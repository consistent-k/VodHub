version: '3.9'

services:
    backend:
        build:
            context: .
            target: backend
        image: vodhub/backend:latest
        ports:
            - '8888:8888'
        environment:
            - NODE_ENV=production

    frontend:
        build:
            context: .
            target: frontend
        image: vodhub/frontend:latest
        ports:
            - '3000:3000'
        environment:
            - NODE_ENV=production
            - API_BASE_URL=http://backend:8888
        depends_on:
            - backend
