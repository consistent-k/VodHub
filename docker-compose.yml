services:
    frontend:
        build:
            context: .
            dockerfile: apps/frontend/Dockerfile
        ports:
            - '127.0.0.1:3000:80'
        environment:
            - NODE_ENV=production
            - API_BASE_URL=http://backend:8888
        depends_on:
            - backend

    backend:
        build:
            context: .
            dockerfile: apps/backend/Dockerfile
        ports:
            - '127.0.0.1:8888:8888'
        environment:
            - NODE_ENV=production
